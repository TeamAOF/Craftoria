voiding_mining_speed = 20.0
voiding_attack_damage = 1.0
voiding_enchantability = 5
bedrock_mining_speed = 15.0
bedrock_attack_damage = 5.0
bedrock_enchantability = 3
draconic_durability = 10000
draconic_mining_speed = 11.5
draconic_attack_damage = 7.0
draconic_enchantability = 1
malachite_durability = 1536
malachite_mining_speed = 14.0
malachite_attack_damage = 5.0
malachite_enchantability = 20
glass_crest_durability = 6144
glass_crest_mining_speed = 18.0
