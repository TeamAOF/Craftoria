#EmbersTextAPI Client Configuration
[general]
	#Master toggle for immersive messages (sent via commands/API)
	immersiveMessagesEnabled = true

#Effect Settings
[effects]
	#List of effect names to disable globally (e.g. ["glitch", "shake"]). Disabled effects render as plain text.
	disabledEffects = []
	#Disables all positional/motion effects (wave, bounce, swing, shake, etc.). Color effects still work. Accessibility feature.
	reduceMotion = false
	#Caps neon/glow quality. 1=fast(6 samples), 2=balanced(12), 3=quality(20). Lower for better performance.
	# Default: 3
	# Range: 1 ~ 3
	maxNeonQuality = 3

#Limits
[limits]
	#Maximum immersive message duration in ticks. 0 = unlimited.
	# Default: 0
	# Range: > 0
	maxMessageDuration = 0
	#Maximum simultaneous active messages per player. 0 = unlimited.
	# Default: 0
	# Range: > 0
	maxActiveMessages = 0

#Performance
[performance]
	#Max entries in TextLayoutCache LRU. Higher = more memory, fewer recomputations.
	# Default: 256
	# Range: 64 ~ 2048
	textLayoutCacheSize = 256
	#Master toggle for SDF font rendering. When false, SDF fonts fall back to vanilla bitmap.
	sdfEnabled = true
