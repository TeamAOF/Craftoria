[Season]
	#Require the calendar item to be in the players inventory to show the HUD?
	#(true/false)
	#Default is false.
	need_calendar = false
	#Having the calendar item shows the detailed version of the HUD
	#Default is false.
	calendar_detail = false
	#Change if you are using a Minecraft day length other than vanilla 
	#value and are using Fabric Seasons.
	#Default Minecraft day is 24000.
	# Default: 24000
	# Range: > 0
	day_length = 24000
	#Change if you are hosting a server and changed the default
	#sub-season length in the Serene Seasons config.
	#Default length is 8 days.
	# Default: 8
	# Range: > 0
	sub_season_length = 8
